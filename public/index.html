<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snap — Acortador de URLs</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>

<div class="auth-card">
  <div class="auth-logo">
    <h1><span>Snap</span></h1>
    <p>Acorta tus URLs en segundos</p>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="login">Iniciar sesión</button>
    <button class="tab-btn" data-tab="register">Registrarse</button>
  </div>

  <!-- Login -->
  <div id="panel-login" class="tab-panel active">
    <div id="login-error" class="alert alert-error" role="alert"></div>
    <form id="login-form" novalidate>
      <div class="form-group">
        <label for="login-email">Email</label>
        <input id="login-email" type="email" placeholder="tu@email.com" autocomplete="email" required />
      </div>
      <div class="form-group">
        <label for="login-password">Contraseña</label>
        <input id="login-password" type="password" placeholder="••••••••" autocomplete="current-password" required />
      </div>
      <button type="submit" class="btn-primary">Entrar</button>
    </form>
  </div>

  <!-- Registro -->
  <div id="panel-register" class="tab-panel">
    <div id="register-error" class="alert alert-error" role="alert"></div>
    <form id="register-form" novalidate>
      <div class="form-group">
        <label for="register-name">Nombre</label>
        <input id="register-name" type="text" placeholder="Tu nombre" autocomplete="name" required />
      </div>
      <div class="form-group">
        <label for="register-email">Email</label>
        <input id="register-email" type="email" placeholder="tu@email.com" autocomplete="email" required />
      </div>
      <div class="form-group">
        <label for="register-password">Contraseña <span style="color:#64748b;font-weight:400">(mínimo 8 caracteres)</span></label>
        <input id="register-password" type="password" placeholder="••••••••" autocomplete="new-password" required />
      </div>
      <button type="submit" class="btn-primary">Crear cuenta</button>
    </form>
  </div>
</div>

<script type="module">
  import { login, register } from '/js/api.js'
  import { saveSession, redirectIfAuthenticated } from '/js/auth.js'

  redirectIfAuthenticated()

  // ── Tabs ──
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const tab = btn.dataset.tab
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'))
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'))
      btn.classList.add('active')
      document.getElementById(`panel-${tab}`).classList.add('active')
      clearErrors()
    })
  })

  function showError(id, msg) {
    const el = document.getElementById(id)
    el.textContent = msg
    el.classList.add('visible')
  }

  function clearErrors() {
    document.querySelectorAll('.alert').forEach(el => {
      el.textContent = ''
      el.classList.remove('visible')
    })
  }

  function setLoading(btn, loading) {
    btn.disabled = loading
    btn.textContent = loading ? 'Cargando…' : btn.dataset.label
  }

  // Guarda el label original de cada botón
  document.querySelectorAll('.btn-primary').forEach(btn => {
    btn.dataset.label = btn.textContent
  })

  // ── Login ──
  document.getElementById('login-form').addEventListener('submit', async e => {
    e.preventDefault()
    clearErrors()
    const email = document.getElementById('login-email').value.trim()
    const password = document.getElementById('login-password').value

    if (!email || !password) {
      showError('login-error', 'Completa todos los campos.')
      return
    }

    const btn = e.target.querySelector('button[type="submit"]')
    setLoading(btn, true)
    try {
      const { token, user } = await login(email, password)
      saveSession(token, user)
      window.location.href = '/dashboard.html'
    } catch (err) {
      showError('login-error', err.status === 401
        ? 'Email o contraseña incorrectos.'
        : err.message)
    } finally {
      setLoading(btn, false)
    }
  })

  // ── Registro ──
  document.getElementById('register-form').addEventListener('submit', async e => {
    e.preventDefault()
    clearErrors()
    const name = document.getElementById('register-name').value.trim()
    const email = document.getElementById('register-email').value.trim()
    const password = document.getElementById('register-password').value

    if (!name || !email || !password) {
      showError('register-error', 'Completa todos los campos.')
      return
    }
    if (password.length < 8) {
      showError('register-error', 'La contraseña debe tener al menos 8 caracteres.')
      return
    }

    const btn = e.target.querySelector('button[type="submit"]')
    setLoading(btn, true)
    try {
      const { token, user } = await register(name, email, password)
      saveSession(token, user)
      window.location.href = '/dashboard.html'
    } catch (err) {
      showError('register-error', err.status === 409
        ? 'Este email ya está registrado.'
        : err.message)
    } finally {
      setLoading(btn, false)
    }
  })
</script>

</body>
</html>
